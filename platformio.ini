; ============================================================================
; WeatherStation2Meshtastic — gateway sensori meteo 868 MHz -> Meshtastic
; Hardware: Heltec WiFi LoRa 32 V3 / V4 (ESP32-S3 + SX1262 + OLED)
;
; Build modulare a due livelli di pre-build:
;   apply_settings.py     [meshtastic] -> include/user_config.h   (rete/nodo)
;   configure_sensors.py  [sensors]    -> src/config/generated_config.h (+ src_filter)
;
; Un SX1262 = un bitrate -> un environment per GRUPPO di sensori:
;   pio run -e groupA_heltec_v3 -t upload   (Fine Offset/Ecowitt + LaCrosse)
;   pio run -e groupA_heltec_v4 -t upload
;   pio run -e groupB_heltec_v3 -t upload   (Bresser)
;   pio run -e groupB_heltec_v4 -t upload
;
; La selezione dei sensori sta in settings.ini ([sensors] enabled = ...) oppure
; si genera con tools/configurator/index.html. Lo script valida che tutti i
; sensori scelti appartengano al gruppo dell'environment compilato.
; ============================================================================

[platformio]
default_envs = groupA_heltec_v3

; ----------------------------------------------------------------------------
; Base comune a tutti gli environment
; ----------------------------------------------------------------------------
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Due script di pre-build coesistono (ordine: prima la rete, poi i sensori).
extra_scripts =
    pre:tools/apply_settings.py
    pre:tools/configure_sensors.py

; Footprint minimo: scarta sezioni di codice/dati non referenziate.
build_flags =
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

; Librerie effettivamente usate dal firmware core (radio + crypto + display).
lib_deps =
    jgromes/RadioLib @ ^7.1.2
    rweather/Crypto @ ^0.4.0
    olikraus/U8g2 @ ^2.36.5

; ----------------------------------------------------------------------------
; GRUPPO A — Fine Offset / Ecowitt + LaCrosse IT+/TFA  (~17.241 kbps)
; ----------------------------------------------------------------------------
[env:groupA_heltec_v3]
board = heltec_wifi_lora_32_V3
build_flags = ${env.build_flags} -D BOARD_HELTEC_V3

[env:groupA_heltec_v4]
; La V4 e' pin-compatibile con la V3 (stesso ESP32-S3 + SX1262 + OLED);
; finche' non esiste una board definition dedicata si usa quella della V3.
board = heltec_wifi_lora_32_V3
build_flags = ${env.build_flags} -D BOARD_HELTEC_V4

; ----------------------------------------------------------------------------
; GRUPPO B — Bresser  (~8.06 kbps)
; ----------------------------------------------------------------------------
[env:groupB_heltec_v3]
board = heltec_wifi_lora_32_V3
build_flags = ${env.build_flags} -D BOARD_HELTEC_V3

[env:groupB_heltec_v4]
board = heltec_wifi_lora_32_V3
build_flags = ${env.build_flags} -D BOARD_HELTEC_V4
