frequency_mhz     = 869.525
preset            = MediumFast
send_interval_min = 10
text_interval_min = 120
short_name        = 
long_name         = weather station
tx_power_dbm      = 22
hop_limit         = 3
ok_to_mqtt        = true
channel_name      =                  ; vuoto = usa il preset (MediumFast)
channel_key       = AQ==
text_channel_name = METEOLAZIO
text_channel_key  = WP6qHPCEFRZE8iK8SHQpZ1K9145G6jdu3YnP+dMSOg0=
latitude          = 41.7708
longitude         = 12.4583
altitude_m        = 21
timezone          = auto

[sensors]
; risolti nel Gruppo A -> 17241 bps, sync 0x2DD4 (derivato)
enabled = WH32, WH31E, WH40, WH57, WH51, WH45, WS80, WS90, TX35